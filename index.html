<head>

<title>Test Tema 7 — Tratados UE y TFUE | Opositar en Valencia</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--naranja:#d97706;--naranja-claro:#fef3c7;--naranja-borde:#f59e0b;--azul-oscuro:#1e293b;--texto:#374151;--texto-suave:#6b7280;--borde:#e5e7eb;--fondo:#fafaf9;--blanco:#ffffff;--verde:#166534;--verde-bg:#f0fdf4;--verde-borde:#86efac;--rojo:#991b1b;--rojo-bg:#fef2f2;--rojo-borde:#fca5a5;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Source Sans 3',sans-serif;background:var(--fondo);color:var(--texto);min-height:100vh;font-size:16px;line-height:1.6;}
  header{background:var(--blanco);border-bottom:1px solid var(--borde);}
  .header-top{max-width:860px;margin:0 auto;padding:1.4rem 1.5rem 1rem;display:flex;align-items:flex-start;gap:1.2rem;}
  .header-logo{width:48px;height:48px;border-radius:8px;object-fit:contain;flex-shrink:0;}
  .header-textos{flex:1;}
  .header-site{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--naranja);font-weight:600;margin-bottom:3px;}
  .header-titulo{font-family:'Lora',serif;font-size:clamp(1.1rem,3.5vw,1.65rem);font-weight:700;color:var(--azul-oscuro);line-height:1.2;}
  .header-sub{font-size:0.88rem;color:var(--texto-suave);margin-top:4px;}
  .header-meta{background:var(--naranja-claro);border-top:1px solid #fde68a;padding:0.55rem 1.5rem;}
  .header-meta-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;font-size:0.83rem;color:#92400e;font-weight:500;}
  .barra-wrap{position:sticky;top:0;z-index:100;background:var(--blanco);border-bottom:1px solid var(--borde);padding:0.6rem 1.5rem;box-shadow:0 1px 6px rgba(0,0,0,0.05);}
  .barra-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:1rem;}
  .barra-track{flex:1;height:6px;background:#f3f4f6;border-radius:99px;overflow:hidden;}
  .barra-fill{height:100%;background:var(--naranja);border-radius:99px;transition:width 0.35s ease;width:0%;}
  .barra-num{font-size:13px;font-weight:600;color:var(--azul-oscuro);white-space:nowrap;min-width:52px;}
  .barra-score{font-size:13px;color:var(--texto-suave);white-space:nowrap;}
  .barra-score .ok{color:var(--verde);font-weight:600;}
  .barra-score .ko{color:var(--rojo);font-weight:600;}
  main{max-width:860px;margin:0 auto;padding:2rem 1.5rem 5rem;}
  .card{background:var(--blanco);border:1px solid var(--borde);border-radius:10px;padding:1.5rem 1.6rem;margin-bottom:1.4rem;transition:box-shadow 0.2s;}
  .card:hover{box-shadow:0 3px 14px rgba(0,0,0,0.06);}
  .card-num{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--naranja);margin-bottom:0.5rem;}
  .card-pregunta{font-family:'Lora',serif;font-size:1rem;font-weight:600;line-height:1.55;color:var(--azul-oscuro);margin-bottom:1.1rem;}
  .opciones{display:flex;flex-direction:column;gap:0.45rem;}
  .opcion{display:flex;align-items:flex-start;gap:0.7rem;padding:0.7rem 1rem;border:1.5px solid var(--borde);border-radius:7px;cursor:pointer;background:var(--blanco);text-align:left;font-family:'Source Sans 3',sans-serif;font-size:0.93rem;color:var(--texto);line-height:1.5;transition:border-color 0.15s,background 0.15s;width:100%;}
  .opcion:hover:not(:disabled){border-color:var(--naranja-borde);background:var(--naranja-claro);}
  .opcion .letra{font-weight:700;color:var(--naranja);min-width:18px;font-size:0.85rem;margin-top:2px;flex-shrink:0;}
  .opcion.correcta{border-color:var(--verde-borde);background:var(--verde-bg);color:var(--verde);}
  .opcion.correcta .letra{color:#15803d;}
  .opcion.incorrecta{border-color:var(--rojo-borde);background:var(--rojo-bg);color:var(--rojo);}
  .opcion.incorrecta .letra{color:var(--rojo);}
  .opcion:disabled{cursor:default;}
  .explicacion{display:none;margin-top:1rem;padding:0.9rem 1rem 0.9rem 1.1rem;background:#fffbeb;border-left:3px solid var(--naranja);border-radius:0 6px 6px 0;font-size:0.875rem;line-height:1.65;color:var(--texto);}
  .explicacion.visible{display:block;animation:fadeIn 0.22s ease;}
  .explicacion strong{color:var(--azul-oscuro);}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
  .resultado{display:none;background:var(--blanco);border:1px solid var(--borde);border-radius:12px;padding:2.5rem 2rem 2rem;margin:1.5rem 0 2rem;text-align:center;}
  .resultado.visible{display:block;animation:fadeIn 0.3s ease;}
  .resultado-eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--naranja);font-weight:600;margin-bottom:0.5rem;}
  .resultado h2{font-family:'Lora',serif;font-size:1.75rem;font-weight:700;color:var(--azul-oscuro);margin-bottom:0.3rem;}
  .resultado-nota{font-size:3.2rem;font-weight:700;color:var(--azul-oscuro);line-height:1;margin:1rem 0 0.3rem;font-family:'Lora',serif;}
  .resultado-nota span{color:var(--naranja);}
  .calif-badge{display:inline-block;padding:5px 16px;border-radius:99px;font-size:0.9rem;font-weight:600;margin:0.6rem 0 1.5rem;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin:0 0 1.5rem;}
  .stat{background:var(--fondo);border:1px solid var(--borde);border-radius:8px;padding:0.9rem 0.5rem;}
  .stat-num{font-size:1.9rem;font-weight:700;font-family:'Lora',serif;}
  .stat-lab{font-size:0.78rem;color:var(--texto-suave);margin-top:2px;}
  .resultado-hint{font-size:0.85rem;color:var(--texto-suave);margin-bottom:1.2rem;}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:0.7rem 1.6rem;border-radius:7px;font-family:'Source Sans 3',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;border:none;transition:all 0.18s;}
  .btn-naranja{background:var(--naranja);color:white;}
  .btn-naranja:hover{background:#b45309;transform:translateY(-1px);}
  .divider{text-align:center;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--texto-suave);margin:2rem 0 1.5rem;display:flex;align-items:center;gap:1rem;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--borde);}
  @media(max-width:580px){main{padding:1.2rem 1rem 4rem;}.card{padding:1.1rem;}.stats{grid-template-columns:1fr 1fr;}.header-top{padding:1rem;gap:0.8rem;}.header-meta{padding:0.5rem 1rem;}}

<script>
const BANCO = [
  // ── TUE: DISPOSICIONES COMUNES ──
  {p:"El artículo 1 TUE establece la base jurídica de la Unión Europea. ¿Qué valor jurídico tienen el TUE y el TFUE entre sí?",ops:["El TUE tiene rango superior al TFUE por ser el tratado constitutivo originario","Ambos Tratados tienen el mismo valor jurídico","El TFUE prevalece en cuestiones de política institucional y económica","El TUE prevalece en materia de derechos fundamentales y el TFUE en el resto"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 1 TUE establece expresamente que «la Unión se fundamenta en el presente Tratado y en el Tratado de Funcionamiento de la Unión Europea (…). Ambos Tratados tienen el mismo valor jurídico». Además, el art. 1 aclara que «la Unión sustituirá y sucederá a la Comunidad Europea», reflejando la transformación operada por el Tratado de Lisboa."},
  {p:"Según el artículo 1 TUE, ¿cómo se tomarán las decisiones en la Unión Europea?",ops:["De la forma más eficiente que permitan los recursos institucionales disponibles","De la forma más abierta y próxima a los ciudadanos que sea posible","De la forma más rápida para garantizar la seguridad jurídica","De la forma más consensuada entre los Estados miembros y las instituciones"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 1 TUE establece que el proceso de integración constituye «una nueva etapa en el proceso creador de una unión cada vez más estrecha entre los pueblos de Europa, en la cual las decisiones serán tomadas de la forma más abierta y próxima a los ciudadanos que sea posible». Este principio conecta con la transparencia y el principio de subsidiariedad."},
  {p:"El artículo 2 TUE enuncia los valores en los que se fundamenta la Unión Europea. ¿Cuáles son?",ops:["Libertad, paz, prosperidad, democracia, Estado de Derecho e igualdad entre los pueblos","Respeto de la dignidad humana, libertad, democracia, igualdad, Estado de Derecho y respeto de los derechos humanos, incluidos los derechos de las minorías","Solidaridad, justicia, cohesión, tolerancia, pluralismo y no discriminación","Democracia, justicia social, mercado interior, unión monetaria y diversidad cultural"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 2 TUE establece que «la Unión se fundamenta en los valores de respeto de la dignidad humana, libertad, democracia, igualdad, Estado de Derecho y respeto de los derechos humanos, incluidos los derechos de las personas pertenecientes a minorías». Estos valores son comunes a los Estados miembros en una sociedad caracterizada por el pluralismo, la no discriminación, la tolerancia, la justicia, la solidaridad y la igualdad entre mujeres y hombres."},
  {p:"El artículo 3.1 TUE establece la finalidad primordial de la Unión. ¿Cuál es?",ops:["Establecer un mercado interior sin fronteras y una unión económica y monetaria","Promover la paz, sus valores y el bienestar de sus pueblos","Garantizar la libre circulación de personas, bienes, servicios y capitales","Crear un espacio de libertad, seguridad y justicia sin fronteras interiores"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 3.1 TUE es conciso y fundamental: «La Unión tiene como finalidad promover la paz, sus valores y el bienestar de sus pueblos». Es la finalidad más general de la Unión, que engloba los demás objetivos específicos enumerados en los apartados siguientes."},
  {p:"Según el artículo 3.2 TUE, ¿qué ofrece la Unión a sus ciudadanos?",ops:["Un mercado único con libre circulación de mercancías y servicios sin aranceles","Un espacio de libertad, seguridad y justicia sin fronteras interiores, con libre circulación de personas y medidas de control en fronteras exteriores, asilo, inmigración y lucha contra la delincuencia","Una ciudadanía europea con derechos políticos plenos en todos los Estados miembros","Un sistema de protección social unificado con prestaciones homogéneas en toda la UE"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 3.2 TUE establece que «la Unión ofrecerá a sus ciudadanos un espacio de libertad, seguridad y justicia sin fronteras interiores, en el que esté garantizada la libre circulación de personas conjuntamente con medidas adecuadas en materia de control de las fronteras exteriores, asilo, inmigración y de prevención y lucha contra la delincuencia»."},
  {p:"El artículo 3.3 TUE establece que la Unión establecerá un mercado interior basado en determinados principios. ¿Cuáles son los tres pilares económicos principales que menciona?",ops:["Libre comercio, unión aduanera y armonización fiscal","Crecimiento económico equilibrado, estabilidad de los precios y una economía social de mercado altamente competitiva tendente al pleno empleo y al progreso social","Cohesión territorial, desarrollo rural y política industrial europea","Unión monetaria, coordinación fiscal y supervisión bancaria conjunta"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 3.3 TUE establece que el mercado interior se basa en «un crecimiento económico equilibrado y en la estabilidad de los precios, en una economía social de mercado altamente competitiva, tendente al pleno empleo y al progreso social, y en un nivel elevado de protección y mejora de la calidad del medio ambiente». Los tres pilares son: crecimiento equilibrado + estabilidad de precios, economía social de mercado, y protección del medio ambiente."},
  {p:"Según el artículo 3.4 TUE, ¿cuál es la moneda de la unión económica y monetaria que establece la Unión?",ops:["El ECU, mientras no todos los Estados adopten el euro","El euro","La moneda oficial de cada Estado miembro hasta su convergencia","El Derecho Especial de Giro del FMI como referencia común"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 3.4 TUE establece con sencillez: «La Unión establecerá una unión económica y monetaria cuya moneda es el euro». Aunque no todos los Estados miembros han adoptado el euro (algunos tienen opt-out), el Tratado la establece como la moneda de la UME."},
  {p:"El artículo 3.5 TUE regula la acción exterior de la Unión. ¿Cuál de las siguientes afirmaciones refleja mejor su contenido?",ops:["La UE desarrollará una política exterior y de seguridad común con mando militar unificado","En sus relaciones con el mundo, la Unión afirmará sus valores e intereses, contribuirá a la paz, el desarrollo sostenible, el comercio libre y justo, la erradicación de la pobreza y el respeto del Derecho internacional","La UE podrá declarar la guerra a terceros Estados en nombre de sus miembros","La Unión gestionará las políticas de inmigración y asilo de todos sus miembros en relación con terceros Estados"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 3.5 TUE establece que en sus relaciones exteriores «la Unión afirmará y promoverá sus valores e intereses y contribuirá a la protección de sus ciudadanos», y que contribuirá «a la paz, la seguridad, el desarrollo sostenible del planeta, la solidaridad y el respeto mutuo entre los pueblos, el comercio libre y justo, la erradicación de la pobreza y la protección de los derechos humanos», así como al respeto de la Carta de las Naciones Unidas."},
  {p:"El artículo 4.1 TUE establece la regla de atribución de competencias. ¿Qué dice sobre las competencias no atribuidas a la Unión?",ops:["Pasan automáticamente a ser competencias compartidas entre la Unión y los Estados miembros","Toda competencia no atribuida a la Unión en los Tratados corresponde a los Estados miembros","Son competencias residuales gestionadas por el Consejo Europeo caso por caso","Quedan en suspenso hasta que una revisión del Tratado las atribuya expresamente"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 4.1 TUE establece que «toda competencia no atribuida a la Unión en los Tratados corresponde a los Estados miembros». Este principio, conocido como cláusula residual o de atribución, garantiza que la Unión solo actúa dentro de los límites de lo que los Estados le han conferido expresamente."},
  {p:"El artículo 4.2 TUE establece que la Unión respetará la identidad nacional de los Estados. ¿Qué aspectos concretos menciona expresamente?",ops:["La identidad cultural, la lengua nacional y la tradición jurídica de cada Estado","La identidad nacional inherente a las estructuras fundamentales políticas y constitucionales, incluyendo la autonomía local y regional, y las funciones esenciales del Estado (integridad territorial, orden público y seguridad nacional)","La soberanía monetaria, la política fiscal y el modelo social de cada Estado miembro","La religión mayoritaria, el sistema educativo y el régimen de propiedad de cada Estado"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 4.2 TUE establece que la Unión respetará «la identidad nacional, inherente a las estructuras fundamentales políticas y constitucionales de éstos, también en lo referente a la autonomía local y regional». Añade que respetará las funciones esenciales del Estado: garantizar su integridad territorial, mantener el orden público y salvaguardar la seguridad nacional, que «seguirá siendo responsabilidad exclusiva de cada Estado miembro»."},
  {p:"El principio de cooperación leal del artículo 4.3 TUE impone obligaciones tanto a la Unión como a los Estados miembros. ¿Cuáles son las obligaciones de los Estados?",ops:["Solo deben aplicar correctamente el derecho de la UE; no tienen obligaciones activas de cooperación","Adoptarán todas las medidas para asegurar el cumplimiento de las obligaciones derivadas de los Tratados o actos de las instituciones; ayudarán a la Unión en su misión; y se abstendrán de medidas que puedan poner en peligro los objetivos de la Unión","Solo tienen la obligación negativa de no obstaculizar la aplicación del Derecho de la UE","Deben incorporar la legislación de la UE en su Constitución nacional dentro de los dos años siguientes a su adopción"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 4.3 TUE establece tres obligaciones de los Estados: (1) adoptar todas las medidas para cumplir las obligaciones de los Tratados o de las instituciones; (2) ayudar a la Unión en el cumplimiento de su misión; (3) abstenerse de toda medida que pueda poner en peligro los objetivos de la Unión. Las tres juntas configuran el principio de cooperación leal o lealtad comunitaria."},
  {p:"El artículo 5.1 TUE establece qué principios rigen la delimitación y el ejercicio de las competencias de la Unión. ¿Cuáles son?",ops:["La delimitación: principio de subsidiariedad; el ejercicio: principio de atribución y proporcionalidad","La delimitación: principio de atribución; el ejercicio: principios de subsidiariedad y proporcionalidad","La delimitación y el ejercicio: principios de atribución, subsidiariedad y proporcionalidad por igual","La delimitación: principios de unanimidad y consenso; el ejercicio: principio de mayoría cualificada"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 5.1 TUE establece claramente la distinción: «La delimitación de las competencias de la Unión se rige por el principio de atribución. El ejercicio de las competencias de la Unión se rige por los principios de subsidiariedad y proporcionalidad». El principio de atribución define qué puede hacer la UE; subsidiariedad y proporcionalidad regulan cómo lo hace."},
  {p:"¿Cuál es la definición del principio de subsidiariedad según el artículo 5.3 TUE?",ops:["La Unión actúa siempre que sus instituciones tengan mayor capacidad técnica que los Estados miembros","En los ámbitos no exclusivos, la Unión intervendrá solo si los objetivos de la acción pretendida no pueden ser alcanzados suficientemente por los Estados a nivel central, regional o local, y pueden alcanzarse mejor a escala de la Unión por su dimensión o efectos","La Unión sustituye a los Estados miembros en toda acción que implique un efecto transfronterizo","Los Estados miembros tienen prioridad en todas las materias salvo las expresamente atribuidas a la Unión"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 5.3 TUE define la subsidiariedad: la Unión intervendrá en los ámbitos no exclusivos «sólo en caso de que, y en la medida en que, los objetivos de la acción pretendida no puedan ser alcanzados de manera suficiente por los Estados miembros, ni a nivel central ni a nivel regional y local, sino que puedan alcanzarse mejor, debido a la dimensión o a los efectos de la acción pretendida, a escala de la Unión». Los Parlamentos nacionales velan por este principio."},
  {p:"¿Cómo define el artículo 5.4 TUE el principio de proporcionalidad?",ops:["Las medidas de la UE deben ser aprobadas por mayoría proporcional a la población de los Estados miembros","El contenido y la forma de la acción de la Unión no excederán de lo necesario para alcanzar los objetivos de los Tratados","La Unión debe distribuir sus recursos en proporción a la riqueza de cada Estado miembro","Las directivas deben ser proporcionales en su alcance al nivel de desarrollo económico del Estado destinatario"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 5.4 TUE define el principio de proporcionalidad: «el contenido y la forma de la acción de la Unión no excederán de lo necesario para alcanzar los objetivos de los Tratados». Este principio limita tanto el contenido (qué regula) como la forma (cómo regula) de la acción de la UE, impidiendo intervenciones excesivas."},
  {p:"El artículo 6.1 TUE reconoce la Carta de los Derechos Fundamentales de la UE. ¿Qué valor jurídico le atribuye y en qué fecha fue adaptada en Estrasburgo?",ops:["Valor de recomendación no vinculante; adaptada el 7 de diciembre de 2000","El mismo valor jurídico que los Tratados; adaptada el 12 de diciembre de 2007 en Estrasburgo","Valor de directiva con efecto directo; adaptada en Niza el 7 de diciembre de 2000","Valor de principio general del Derecho de la UE; adoptada en Lisboa el 13 de diciembre de 2007"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 6.1 TUE establece que «la Unión reconoce los derechos, libertades y principios enunciados en la Carta de los Derechos Fundamentales de la Unión Europea de 7 de diciembre de 2000, tal como fue adaptada el 12 de diciembre de 2007 en Estrasburgo, la cual tendrá el mismo valor jurídico que los Tratados». La Carta no amplía las competencias de la Unión."},
  {p:"El artículo 6.2 TUE establece que la Unión se adherirá a un Convenio internacional de derechos humanos. ¿A cuál?",ops:["A la Declaración Universal de Derechos Humanos de la ONU","Al Convenio Europeo para la Protección de los Derechos Humanos y de las Libertades Fundamentales","Al Pacto Internacional de Derechos Civiles y Políticos de la ONU","Al Estatuto de Roma de la Corte Penal Internacional"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 6.2 TUE establece que «la Unión se adherirá al Convenio Europeo para la Protección de los Derechos Humanos y de las Libertades Fundamentales». Esta adhesión no modifica las competencias de la Unión. Aunque prevista en el Tratado de Lisboa, la adhesión aún no se ha producido por las dificultades jurídicas puestas de manifiesto por el TJUE en su Dictamen 2/13."},
  {p:"El artículo 7 TUE establece un mecanismo de sanción para Estados que violen los valores del artículo 2. ¿Qué mayoría exige al Consejo para constatar un riesgo claro de violación grave?",ops:["Unanimidad del Consejo, previa aprobación del Consejo Europeo","Mayoría de cuatro quintos del Consejo, previa aprobación del Parlamento Europeo","Mayoría cualificada del Consejo, con informe de la Comisión","Unanimidad del Consejo Europeo, a propuesta de un tercio de los Estados miembros"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 7.1 TUE establece que para constatar un «riesgo claro de violación grave» de los valores del art. 2, el Consejo necesita «mayoría de cuatro quintos de sus miembros y previa aprobación del Parlamento Europeo». Esta mayoría de cuatro quintos (no unanimidad) facilita la activación del mecanismo frente al Estado infractor."},
  {p:"Si el Consejo Europeo constata una «violación grave y persistente» (art. 7.2 TUE), ¿qué mayoría se requiere y a propuesta de quién?",ops:["Mayoría cualificada del Consejo Europeo, a propuesta de la Comisión","Unanimidad del Consejo Europeo, a propuesta de un tercio de los Estados miembros o de la Comisión, previa aprobación del Parlamento Europeo","Mayoría de cuatro quintos del Consejo Europeo, a propuesta del Parlamento Europeo","Mayoría absoluta del Consejo Europeo, con dictamen del TJUE"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 7.2 TUE establece que el Consejo Europeo «por unanimidad y a propuesta de un tercio de los Estados miembros o de la Comisión y previa aprobación del Parlamento Europeo» puede constatar la violación grave y persistente. La unanimidad (más exigente que los cuatro quintos del art. 7.1) refleja la mayor gravedad de esta constatación."},
  {p:"Una vez constatada la violación grave y persistente (art. 7.2), ¿qué medida puede adoptar el Consejo según el artículo 7.3 TUE y qué obligaciones del Estado afectado subsisten?",ops:["Puede expulsar al Estado miembro de la Unión; todas sus obligaciones cesan automáticamente","Puede suspender determinados derechos del Estado, incluidos los derechos de voto en el Consejo, por mayoría cualificada; las obligaciones del Estado derivadas de los Tratados continuarán siendo vinculantes","Puede imponer sanciones económicas al Estado; el Estado queda exento del pago de contribuciones al presupuesto de la UE","Puede disolver el Gobierno del Estado infractor; la soberanía del Estado queda provisionalmente en manos de la Comisión"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 7.3 TUE establece que el Consejo puede decidir, por mayoría cualificada, «que se suspendan determinados derechos derivados de la aplicación de los Tratados al Estado miembro (…), incluidos los derechos de voto del representante del Gobierno de dicho Estado miembro en el Consejo». Pero «las obligaciones del Estado miembro (…) derivadas de los Tratados continuarán, en cualquier caso, siendo vinculantes»."},
  {p:"El artículo 8 TUE regula las relaciones con los países vecinos. ¿Qué tipo de relación establece la Unión con ellos?",ops:["Relaciones de plena integración económica equivalente a la adhesión","Relaciones preferentes con el objetivo de establecer un espacio de prosperidad y buena vecindad basado en los valores de la Unión","Relaciones de cooperación militar para la defensa de las fronteras exteriores","Relaciones comerciales protocolarias sin derechos ni obligaciones recíprocos"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 8.1 TUE establece que «la Unión desarrollará con los países vecinos relaciones preferentes, con el objetivo de establecer un espacio de prosperidad y de buena vecindad basado en los valores de la Unión y caracterizado por unas relaciones estrechas y pacíficas fundadas en la cooperación». La UE puede celebrar acuerdos específicos con estos países, que pueden incluir derechos y obligaciones recíprocos."},
  // ── TFUE: ACTOS JURÍDICOS ──
  {p:"El artículo 288 TFUE enumera los tipos de actos jurídicos de la Unión. ¿Cuáles son?",ops:["Leyes, leyes marco, reglamentos de ejecución, resoluciones y opiniones","Reglamentos, directivas, decisiones, recomendaciones y dictámenes","Tratados, protocolos, anexos, declaraciones y acuerdos interinstitucionales","Normas primarias, normas secundarias, normas terciarias, acuerdos y recomendaciones"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 288 TFUE establece que para ejercer las competencias de la Unión, las instituciones adoptarán cinco tipos de actos: reglamentos, directivas, decisiones, recomendaciones y dictámenes. Los tres primeros son vinculantes; las recomendaciones y dictámenes no lo son."},
  {p:"Según el artículo 288 TFUE, ¿cuáles son las características del reglamento europeo?",ops:["Tiene alcance particular; es obligatorio solo para sus destinatarios; se notifica a quienes va dirigido","Tiene alcance general; es obligatorio en todos sus elementos y directamente aplicable en cada Estado miembro","Obliga al Estado destinatario en cuanto al resultado, dejando a las autoridades nacionales la elección de la forma y los medios","No es vinculante; tiene valor de recomendación con fuerza política pero no jurídica"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 288 TFUE define el reglamento con tres características: (1) alcance general (no particular), (2) obligatorio en todos sus elementos (no solo en cuanto al resultado), y (3) directamente aplicable en cada Estado miembro (sin necesidad de transposición). Estas tres notas distinguen al reglamento de la directiva y de otros actos."},
  {p:"¿Cómo define el artículo 288 TFUE la directiva europea?",ops:["Tiene alcance general y es directamente aplicable en todos sus elementos en cada Estado miembro","Obliga al Estado miembro destinatario en cuanto al resultado que deba conseguirse, dejando a las autoridades nacionales la elección de la forma y de los medios","Es un acto no vinculante que orienta la política de los Estados miembros en una materia determinada","Es obligatoria en todos sus elementos solo para el Estado al que va expresamente dirigida"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 288 TFUE define la directiva: «obligará al Estado miembro destinatario en cuanto al resultado que deba conseguirse, dejando, sin embargo, a las autoridades nacionales la elección de la forma y de los medios». La directiva exige transposición: el Estado debe lograr el resultado, pero decide cómo hacerlo en su ordenamiento interno."},
  {p:"Según el artículo 288 TFUE, ¿cómo es la decisión europea y a quién puede ir dirigida?",ops:["No es vinculante y puede dirigirse a cualquier persona física o jurídica de la UE","Es obligatoria en todos sus elementos; cuando designe destinatarios, solo será obligatoria para éstos","Es vinculante solo para las instituciones de la UE que la adoptan, no para los Estados miembros","Es obligatoria para todos los Estados miembros con independencia de si tiene o no destinatarios"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 288 TFUE establece que «la decisión será obligatoria en todos sus elementos. Cuando designe destinatarios, sólo será obligatoria para éstos». La decisión puede no tener destinatarios (obligatoria erga omnes) o tenerlos específicos (solo obliga a ellos, sean Estados, empresas o particulares)."},
  {p:"¿Qué carácter tienen las recomendaciones y los dictámenes según el artículo 288 TFUE?",ops:["Son vinculantes para los destinatarios pero no crean derechos para los ciudadanos","No son vinculantes","Son vinculantes para los Estados miembros pero no para los particulares","Solo son vinculantes si así lo decide el Parlamento Europeo por mayoría cualificada"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 288 TFUE es claro al respecto: «las recomendaciones y los dictámenes no serán vinculantes». Son instrumentos de orientación política y técnica sin fuerza jurídica obligatoria, aunque pueden tener efectos jurídicos indirectos (los tribunales nacionales deben tomarlos en consideración al interpretar el Derecho de la UE, según la jurisprudencia Grimaldi del TJUE)."},
  {p:"El artículo 289 TFUE define el procedimiento legislativo ordinario. ¿En qué consiste y cuál es la institución que presenta la propuesta?",ops:["Adopción por el Consejo Europeo, a propuesta del Consejo; la iniciativa la tiene el Consejo","Adopción conjunta por el Parlamento Europeo y el Consejo, a propuesta de la Comisión","Adopción por el Parlamento Europeo exclusivamente, previa consulta al Consejo","Adopción por el Consejo por unanimidad, con dictamen del Parlamento Europeo"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 289.1 TFUE define el procedimiento legislativo ordinario: «consiste en la adopción conjunta por el Parlamento Europeo y el Consejo, a propuesta de la Comisión, de un reglamento, una directiva o una decisión». La Comisión tiene el monopolio de la iniciativa legislativa (con excepciones del art. 289.4)."},
  {p:"El artículo 289.3 TFUE establece qué son los actos legislativos europeos. ¿Cómo los define?",ops:["Todos los actos adoptados por el Parlamento Europeo con independencia del procedimiento","Los actos jurídicos que se adopten mediante procedimiento legislativo, ya sea ordinario o especial","Solo los reglamentos y directivas adoptados por unanimidad del Consejo","Los actos que modifiquen los Tratados o amplíen las competencias de la Unión"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 289.3 TFUE establece que «los actos jurídicos que se adopten mediante procedimiento legislativo constituirán actos legislativos». La clave es el procedimiento, no el instrumento: un reglamento adoptado por procedimiento ordinario es un acto legislativo; uno adoptado por la Comisión en virtud de una delegación no lo es."},
  {p:"El artículo 290 TFUE regula la delegación de poderes a la Comisión. ¿Qué restricción expresa establece sobre los «elementos esenciales»?",ops:["Los elementos esenciales solo pueden delegarse con autorización del Consejo Europeo por unanimidad","La regulación de los elementos esenciales de un ámbito estará reservada al acto legislativo y, por lo tanto, no podrá ser objeto de una delegación de poderes","Los elementos esenciales pueden delegarse si el acto legislativo fija un plazo máximo de vigencia inferior a un año","Los elementos esenciales se delegan automáticamente con la entrada en vigor del acto legislativo"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 290.1 TFUE establece que un acto legislativo puede delegar en la Comisión la adopción de «actos no legislativos de alcance general que completen o modifiquen determinados elementos no esenciales». Y añade expresamente: «la regulación de los elementos esenciales de un ámbito estará reservada al acto legislativo y, por lo tanto, no podrá ser objeto de una delegación de poderes». El Parlamento legisla lo esencial; la Comisión puede desarrollar lo no esencial."},
  {p:"El artículo 290.2 TFUE establece las condiciones a las que puede estar sujeta la delegación a la Comisión. ¿Cuáles son?",ops:["El TJUE puede revisar los actos delegados; la Comisión debe consultarlos previamente con el Consejo Europeo","El Parlamento Europeo o el Consejo pueden revocar la delegación; y el acto delegado no podrá entrar en vigor si alguno de ellos formula objeciones en el plazo fijado","El acto delegado necesita ser ratificado por la unanimidad del Consejo para entrar en vigor","Solo el Consejo puede revocar la delegación; el Parlamento solo puede formular recomendaciones"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 290.2 TFUE establece dos condiciones posibles: (a) el Parlamento Europeo o el Consejo podrán decidir revocar la delegación; y (b) el acto delegado no podrá entrar en vigor si el Parlamento Europeo o el Consejo han formulado objeciones en el plazo fijado. Para ambas decisiones, el Parlamento se pronuncia por mayoría de sus miembros y el Consejo por mayoría cualificada."},
  {p:"¿Qué mención debe figurar en el título de los actos delegados según el artículo 290.3 TFUE?",ops:["La expresión 'de aplicación directa' para distinguirlos de los actos legislativos","El adjetivo 'delegado' o 'delegada'","La mención 'acto no legislativo' para diferenciarlos de los legislativos","La referencia al acto legislativo habilitante con su número y fecha"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 290.3 TFUE establece una exigencia de transparencia formal: «en el título de los actos delegados figurará el adjetivo 'delegado' o 'delegada'». Esta denominación permite identificar inmediatamente la naturaleza y origen del acto, diferenciándolo de los actos legislativos y de los actos de ejecución."},
  {p:"El artículo 291 TFUE regula los actos de ejecución. ¿Quién tiene competencia de ejecución como regla general según el art. 291.1?",ops:["La Comisión, como órgano ejecutivo de la Unión","Los Estados miembros, que adoptarán todas las medidas de Derecho interno necesarias","El Consejo, en todos los casos que requieran condiciones uniformes de ejecución","Las agencias de la Unión especializadas en cada materia"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 291.1 TFUE establece que «los Estados miembros adoptarán todas las medidas de Derecho interno necesarias para la ejecución de los actos jurídicamente vinculantes de la Unión». La ejecución del Derecho de la UE corresponde en primer lugar a los Estados; solo cuando se requieran «condiciones uniformes de ejecución» se confieren competencias a la Comisión (o excepcionalmente al Consejo) según el art. 291.2."},
  {p:"Según el artículo 291.2 TFUE, ¿cuándo puede el Consejo, en lugar de la Comisión, recibir competencias de ejecución?",ops:["Siempre que el Parlamento Europeo lo solicite por mayoría de sus miembros","En casos específicos debidamente justificados y en los previstos en los artículos 24 y 26 TUE (política exterior y de seguridad común)","Cuando la Comisión renuncie expresamente a sus competencias de ejecución","Solo en materias de naturaleza presupuestaria o financiera"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 291.2 TFUE establece que cuando se requieran condiciones uniformes de ejecución, se conferirán competencias de ejecución a la Comisión «o, en casos específicos debidamente justificados y en los previstos en los artículos 24 y 26 del Tratado de la Unión Europea, al Consejo». Los arts. 24 y 26 TUE se refieren a la política exterior y de seguridad común, ámbito en el que el Consejo mantiene un papel preponderante."},
  {p:"¿Qué mención debe figurar en el título de los actos de ejecución según el artículo 291.4 TFUE?",ops:["La expresión 'acto no legislativo de ejecución directa'","La expresión 'de ejecución'","La referencia 'adoptado en comitología' cuando se haya seguido ese procedimiento","El nombre de la institución que lo adopta y la base jurídica habilitante"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 291.4 TFUE establece que «en el título de los actos de ejecución figurará la expresión 'de ejecución'». Al igual que con los actos delegados, esta exigencia de denominación permite identificar rápidamente el tipo de acto y su origen, diferenciándolos tanto de los actos legislativos como de los actos delegados."},
  {p:"El artículo 293.1 TFUE regula la modificación de propuestas de la Comisión por el Consejo. ¿Qué mayoría necesita el Consejo para modificarlas?",ops:["Mayoría cualificada, la misma que para aprobar el acto","Mayoría simple cuando la propuesta ha sido objeto de debate parlamentario previo","Unanimidad, salvo excepciones previstas en los Tratados","Mayoría de cuatro quintos de sus miembros"],c:2,exp:"<strong>Respuesta correcta: C.</strong> El art. 293.1 TFUE establece que «cuando, en virtud de los Tratados, el Consejo se pronuncie a propuesta de la Comisión, únicamente podrá modificar la propuesta por unanimidad». Esta exigencia de unanimidad protege el monopolio de iniciativa de la Comisión: si el Consejo quiere apartarse de la propuesta, necesita el acuerdo de todos sus miembros."},
  {p:"El artículo 293.2 TFUE permite a la Comisión modificar su propia propuesta durante el proceso legislativo. ¿Hasta qué momento puede hacerlo?",ops:["Solo antes de que el Parlamento Europeo adopte su posición en primera lectura","En tanto que el Consejo no se haya pronunciado, mientras duren los procedimientos que conduzcan a la adopción del acto","Solo durante los tres meses siguientes a la presentación de la propuesta inicial","Hasta que el Comité de Conciliación haya sido convocado formalmente"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 293.2 TFUE establece que «en tanto que el Consejo no se haya pronunciado, la Comisión podrá modificar su propuesta mientras duren los procedimientos que conduzcan a la adopción de un acto de la Unión». Esta flexibilidad permite a la Comisión adaptar su propuesta a los debates parlamentarios y del Consejo, facilitando el acuerdo legislativo."},
  // ── PROCEDIMIENTO LEGISLATIVO ORDINARIO (ART. 294) ──
  {p:"En la primera lectura del procedimiento legislativo ordinario (art. 294 TFUE), ¿qué ocurre si el Consejo aprueba la posición del Parlamento Europeo?",ops:["El acto se considera adoptado provisionalmente y pasa a segunda lectura automáticamente","El acto de que se trate se adopta en la formulación correspondiente a la posición del Parlamento Europeo","El acto se transmite al Consejo Europeo para su ratificación definitiva","El acto se publica en el DOUE como propuesta de directiva en el plazo de quince días"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 294.4 TFUE establece que «si el Consejo aprueba la posición del Parlamento Europeo, se adoptará el acto de que se trate en la formulación correspondiente a la posición del Parlamento Europeo». Este es el escenario de adopción en primera lectura, el más rápido y sencillo del procedimiento ordinario."},
  {p:"En la segunda lectura del art. 294 TFUE, ¿qué plazo tiene el Parlamento Europeo para pronunciarse sobre la posición del Consejo en primera lectura?",ops:["Dos meses desde la recepción de la posición del Consejo","Tres meses a partir de la transmisión de la posición del Consejo","Seis semanas desde la comunicación oficial del Consejo","Un mes desde la publicación de la posición del Consejo en el DOUE"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 294.7 TFUE establece que en segunda lectura, el Parlamento Europeo dispone de «un plazo de tres meses a partir de dicha transmisión» para pronunciarse. Dentro de ese plazo puede: aprobar (o no pronunciarse), rechazar por mayoría de sus miembros, o proponer enmiendas por mayoría de sus miembros."},
  {p:"Si en la segunda lectura el Parlamento rechaza la posición del Consejo (art. 294.7.b TFUE), ¿qué ocurre con el acto propuesto?",ops:["El acto se devuelve a la Comisión para una nueva propuesta","El acto propuesto se considerará no adoptado","El Consejo puede insistir en su posición por unanimidad en un plazo de seis semanas","El acto pasa automáticamente al Comité de Conciliación"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 294.7.b) TFUE establece que si el Parlamento Europeo «rechaza, por mayoría de los miembros que lo componen, la posición del Consejo en primera lectura, el acto propuesto se considerará no adoptado». El rechazo del Parlamento en segunda lectura es definitivo y paraliza el procedimiento sin posibilidad de que el Consejo insista."},
  {p:"En la segunda lectura, ¿qué ocurre si el Consejo aprueba por mayoría cualificada todas las enmiendas del Parlamento Europeo (art. 294.8.a TFUE)?",ops:["El acto pasa a tercera lectura para su refrendación definitiva","El acto de que se trate se considerará adoptado","El acto se devuelve a la Comisión para su revisión técnica en el plazo de un mes","El Comité de Conciliación debe ratificar el acuerdo en el plazo de seis semanas"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 294.8.a) TFUE establece que «si, en un plazo de tres meses a partir de la recepción de las enmiendas del Parlamento Europeo, el Consejo, por mayoría cualificada, aprueba todas estas enmiendas, el acto de que se trate se considerará adoptado». El Consejo necesita unanimidad para aprobar las enmiendas que hayan recibido dictamen negativo de la Comisión (art. 294.9)."},
  {p:"El Comité de Conciliación del artículo 294.10 TFUE se convoca cuando el Consejo no aprueba todas las enmiendas del Parlamento en segunda lectura. ¿Cuánto tiempo tiene para alcanzar un texto conjunto?",ops:["Tres meses desde su convocatoria","Seis semanas a partir de su convocatoria","Dos meses desde la segunda lectura del Consejo","Un mes desde la publicación de las enmiendas en el DOUE"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 294.10 TFUE establece que el Comité de Conciliación tiene «el plazo de seis semanas a partir de su convocatoria» para alcanzar un acuerdo sobre un texto conjunto. El Comité está compuesto por los miembros del Consejo (o sus representantes) y un número igual de representantes del Parlamento Europeo."},
  {p:"¿Qué mayorías se requieren en el Comité de Conciliación para aprobar el texto conjunto, según el artículo 294.10 TFUE?",ops:["Unanimidad del lado del Consejo y mayoría de dos tercios del lado del Parlamento","Mayoría cualificada de los miembros del Consejo o sus representantes y mayoría de los miembros que representen al Parlamento Europeo","Mayoría simple de ambas partes del Comité en votación conjunta","Unanimidad de ambas partes para garantizar el máximo consenso"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 294.10 TFUE establece que el texto conjunto se aprueba «por mayoría cualificada de los miembros del Consejo o sus representantes y por mayoría de los miembros que representen al Parlamento Europeo». Son dos mayorías distintas que deben alcanzarse simultáneamente en las respectivas delegaciones del Comité."},
  {p:"Si el Comité de Conciliación no aprueba un texto conjunto en el plazo de seis semanas, ¿qué ocurre con el acto (art. 294.12 TFUE)?",ops:["El Consejo puede aprobarlo por unanimidad sin la participación del Parlamento","El acto propuesto se considerará no adoptado","La Comisión puede proponer un nuevo texto de compromiso en el plazo de un mes","El Consejo Europeo puede desbloquear el procedimiento por consenso"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 294.12 TFUE es taxativo: «si, en un plazo de seis semanas a partir de su convocatoria, el Comité de Conciliación no aprueba un texto conjunto, el acto propuesto se considerará no adoptado». El fracaso en conciliación es definitivo; no hay mecanismo para insistir ni desbloquear."},
  {p:"En la tercera lectura del art. 294.13 TFUE, ¿qué plazo tienen el Parlamento y el Consejo para adoptar el acto conforme al texto conjunto y qué mayorías se requieren?",ops:["Un mes; el Parlamento por mayoría de dos tercios y el Consejo por unanimidad","Seis semanas; el Parlamento por mayoría de los votos emitidos y el Consejo por mayoría cualificada","Tres meses; ambas instituciones por mayoría absoluta de sus miembros","Dos meses; el Parlamento por mayoría simple y el Consejo por mayoría de cuatro quintos"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 294.13 TFUE establece que «el Parlamento Europeo y el Consejo dispondrán cada uno de seis semanas a partir de dicha aprobación para adoptar el acto de que se trate conforme a dicho texto, pronunciándose el Parlamento Europeo por mayoría de los votos emitidos y el Consejo por mayoría cualificada». Si alguno no adopta el acto, se considerará no adoptado."},
  {p:"El artículo 294.14 TFUE permite ampliar los plazos del procedimiento legislativo ordinario. ¿Cuánto pueden ampliarse los plazos de tres meses y de seis semanas?",ops:["Un mes y dos semanas respectivamente, a iniciativa del Parlamento Europeo o del Consejo","Dos meses y un mes respectivamente, a propuesta de la Comisión","Tres meses y seis semanas respectivamente, por acuerdo unánime de todas las instituciones","Un mes y un mes respectivamente, por decisión del Consejo Europeo"],c:0,exp:"<strong>Respuesta correcta: A.</strong> El art. 294.14 TFUE establece que «los períodos de tres meses y de seis semanas contemplados en el presente artículo podrán ampliarse, como máximo, en un mes y dos semanas respectivamente, por iniciativa del Parlamento Europeo o del Consejo». Esta posibilidad de prórroga proporciona flexibilidad cuando las negociaciones requieren más tiempo."},
  {p:"El artículo 296 TFUE establece una obligación de motivación para los actos jurídicos de la UE. ¿Qué exige expresamente?",ops:["Los actos deben acompañarse de un análisis de impacto regulatorio antes de su adopción","Los actos jurídicos deberán estar motivados y se referirán a las propuestas, iniciativas, recomendaciones, peticiones o dictámenes previstos por los Tratados","Los actos solo necesitan motivación cuando afecten negativamente a los derechos de los ciudadanos","Los actos legislativos deben motivarse en tres lenguas oficiales de la UE al menos"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 296 TFUE establece que «los actos jurídicos deberán estar motivados y se referirán a las propuestas, iniciativas, recomendaciones, peticiones o dictámenes previstos por los Tratados». La motivación es una garantía de transparencia y control judicial: permite conocer las razones que llevaron a la institución a adoptar el acto y es requisito de validez."},
  {p:"El artículo 297.1 TFUE regula la firma y entrada en vigor de los actos legislativos. ¿Quién firma los adoptados por procedimiento ordinario y cuándo entran en vigor si no fijan fecha?",ops:["Los firma el Presidente del Consejo Europeo; entran en vigor a los treinta días de su publicación","Los firman el Presidente del Parlamento Europeo y el Presidente del Consejo; entran en vigor a los veinte días de su publicación en el DOUE","Los firma el Presidente de la Comisión; entran en vigor el día de su publicación","Los firman los Presidentes de las tres instituciones; entran en vigor a los diez días de su publicación"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 297.1 TFUE establece que los actos legislativos adoptados por procedimiento ordinario «serán firmados por el Presidente del Parlamento Europeo y por el Presidente del Consejo» y que «entrarán en vigor en la fecha que ellos mismos fijen o, a falta de ella, a los veinte días de su publicación» en el DOUE. El plazo supletorio de veinte días es un dato preciso muy preguntado."},
  {p:"El artículo 297.2 TFUE regula la publicación de los actos no legislativos. ¿Qué directivas y decisiones NO se publican en el DOUE?",ops:["Las directivas y decisiones de la Comisión sobre competencia empresarial","Las demás directivas (que no tienen a todos los Estados como destinatarios) y las decisiones que indiquen un destinatario, que se notifican a sus destinatarios","Las directivas adoptadas por procedimiento especial sin participación del Parlamento","Las decisiones adoptadas por unanimidad del Consejo en política exterior"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 297.2 TFUE distingue: los reglamentos, las directivas destinadas a todos los Estados y las decisiones sin destinatario se publican en el DOUE. Sin embargo, «las demás directivas, así como las decisiones que indiquen un destinatario, se notificarán a sus destinatarios y surtirán efecto en virtud de dicha notificación»."},
  {p:"El artículo 299 TFUE establece que determinados actos de la UE son títulos ejecutivos. ¿Quiénes pueden adoptarlos y frente a quiénes son ejecutivos?",ops:["Solo el Tribunal de Justicia puede emitir títulos ejecutivos; son ejecutivos frente a todos","Los actos del Consejo, de la Comisión o del Banco Central Europeo que impongan una obligación pecuniaria a personas distintas de los Estados","El Parlamento Europeo puede emitir títulos ejecutivos en materia presupuestaria","Solo la Comisión puede emitir títulos ejecutivos, previo dictamen del TJUE"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 299 TFUE establece que «los actos del Consejo, de la Comisión o del Banco Central Europeo que impongan una obligación pecuniaria a personas distintas de los Estados serán títulos ejecutivos». La ejecución forzosa se rige por las normas de procedimiento civil del Estado donde se lleve a cabo y solo puede suspenderse por decisión del TJUE."},
  // ── PREGUNTAS DE SÍNTESIS ──
  {p:"¿Cuál es la diferencia fundamental entre un reglamento y una directiva europeos según el artículo 288 TFUE?",ops:["El reglamento solo puede adoptarlo el Consejo; la directiva puede adoptarla también el Parlamento Europeo","El reglamento es directamente aplicable sin necesidad de transposición; la directiva obliga en cuanto al resultado pero deja a los Estados la elección de forma y medios (requiere transposición)","El reglamento tiene efecto retroactivo y la directiva no puede tenerlo","El reglamento va dirigido a todos los ciudadanos; la directiva solo a los funcionarios nacionales"],c:1,exp:"<strong>Respuesta correcta: B.</strong> La diferencia clave es la aplicabilidad directa: el reglamento es «directamente aplicable en cada Estado miembro» sin necesidad de ningún acto nacional de transposición; la directiva, en cambio, «obliga al Estado miembro destinatario en cuanto al resultado» pero deja a las autoridades nacionales «la elección de la forma y de los medios», por lo que requiere un acto nacional de transposición."},
  {p:"¿Qué diferencia el principio de atribución del principio de subsidiariedad en el ámbito de la Unión Europea (art. 5 TUE)?",ops:["No hay diferencia práctica: ambos limitan la acción de la UE a las materias que los Estados le han conferido","El principio de atribución determina qué puede hacer la UE (competencias conferidas); el de subsidiariedad regula cuándo puede actuar en los ámbitos no exclusivos (solo si los Estados no pueden alcanzar suficientemente los objetivos)","El principio de atribución se aplica a las instituciones; el de subsidiariedad solo a los Estados miembros","El principio de atribución es de aplicación en política exterior; el de subsidiariedad en política interior"],c:1,exp:"<strong>Respuesta correcta: B.</strong> Son principios complementarios pero distintos: el principio de atribución (art. 5.1 y 5.2) delimita las competencias de la UE (qué puede hacer: solo lo que los Tratados le atribuyen). El principio de subsidiariedad (art. 5.3) regula el ejercicio en los ámbitos no exclusivos (cuándo actúa: solo si los Estados no pueden alcanzar suficientemente los objetivos). La proporcionalidad (art. 5.4) regula cómo actúa (no excediendo de lo necesario)."},
  {p:"¿En qué se diferencian los actos delegados (art. 290 TFUE) de los actos de ejecución (art. 291 TFUE)?",ops:["No hay diferencia sustancial: ambos son adoptados por la Comisión en virtud de una habilitación legislativa","Los actos delegados completan o modifican elementos no esenciales de un acto legislativo; los actos de ejecución aseguran condiciones uniformes de ejecución de actos vinculantes; el control parlamentario es diferente en cada caso","Los actos delegados son adoptados por el Consejo y los actos de ejecución por la Comisión","Los actos delegados tienen rango legislativo y los actos de ejecución tienen rango reglamentario"],c:1,exp:"<strong>Respuesta correcta: B.</strong> La diferencia es funcional: los actos delegados (art. 290) sirven para completar o modificar elementos no esenciales del acto legislativo (cuasi-legislativos), con control del Parlamento y el Consejo; los actos de ejecución (art. 291) sirven para asegurar condiciones uniformes de aplicación de actos vinculantes (ejecutivos), con control de los Estados miembros mediante comités (comitología). Los delegados llevan 'delegado' en el título; los de ejecución llevan 'de ejecución'."},
  {p:"Según el artículo 7 TUE, ¿cuál es la diferencia entre la constatación de un «riesgo claro» (art. 7.1) y una «violación grave y persistente» (art. 7.2)?",ops:["No hay diferencia: ambas constataciones tienen los mismos efectos y requieren la misma mayoría","El 'riesgo claro' (art. 7.1) la constata el Consejo por mayoría de 4/5, previo Parlamento; la 'violación grave y persistente' (art. 7.2) la constata el Consejo Europeo por unanimidad, previo Parlamento. Solo la del art. 7.2 puede llevar a la suspensión de derechos del art. 7.3","El 'riesgo claro' puede llevar a la expulsión del Estado; la 'violación grave y persistente' solo a recomendaciones","La 'violación grave' la constata el Consejo por unanimidad; el 'riesgo claro' el Consejo Europeo por mayoría cualificada"],c:1,exp:"<strong>Respuesta correcta: B.</strong> Hay dos fases distintas en el mecanismo del art. 7 TUE: (1) art. 7.1: constatación de «riesgo claro de violación grave» por el Consejo con mayoría de 4/5, previo Parlamento — solo puede dirigir recomendaciones; (2) art. 7.2: constatación de «violación grave y persistente» por el Consejo Europeo por unanimidad, previo Parlamento — habilita al Consejo a suspender derechos del Estado (art. 7.3) por mayoría cualificada, incluidos derechos de voto."}
];

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function prepararPreguntas(){const m=shuffle(BANCO);return m.map(q=>{const ct=q.ops[q.c];const no=shuffle(q.ops);return{p:q.p,ops:no,c:no.indexOf(ct),exp:q.exp};});}
let preguntas=[],respondidas=0,correctas=0,incorrectas=0;
function actualizarBarra(){const pct=preguntas.length?(respondidas/preguntas.length)*100:0;document.getElementById('barraFill').style.width=pct+'%';document.getElementById('barraNum').textContent=respondidas+' / '+preguntas.length;document.getElementById('scoreOk').textContent='✓ '+correctas;document.getElementById('scoreKo').textContent='✗ '+incorrectas;}
function responder(qi,oi){const q=preguntas[qi];const btns=document.querySelectorAll('[data-qi="'+qi+'"]');btns.forEach(b=>b.disabled=true);btns.forEach((b,j)=>{if(j===q.c)b.classList.add('correcta');else if(j===oi&&oi!==q.c)b.classList.add('incorrecta');});document.getElementById('exp-'+qi).classList.add('visible');respondidas++;if(oi===q.c)correctas++;else incorrectas++;actualizarBarra();if(respondidas===preguntas.length)setTimeout(mostrarResultado,700);}
function mostrarResultado(){const pct=Math.round((correctas/preguntas.length)*100);document.getElementById('resPunt').innerHTML=correctas+' <span>/ '+preguntas.length+'</span>';document.getElementById('resCorr').textContent=correctas;document.getElementById('resIncorr').textContent=incorrectas;document.getElementById('resPct').textContent=pct+'%';let txt,col,bg;if(pct>=90){txt='🏆 Sobresaliente';col='#166534';bg='#f0fdf4';}else if(pct>=75){txt='✅ Notable';col='#1e3a5f';bg='#eff6ff';}else if(pct>=60){txt='📘 Aprobado';col='#92400e';bg='#fffbeb';}else{txt='❌ Insuficiente — ¡Sigue practicando!';col='#991b1b';bg='#fef2f2';}document.getElementById('resCalif').innerHTML='<span class="calif-badge" style="background:'+bg+';color:'+col+'">'+txt+'</span>';const el=document.getElementById('resultado');el.classList.add('visible');el.scrollIntoView({behavior:'smooth',block:'center'});}
function render(){respondidas=0;correctas=0;incorrectas=0;preguntas=prepararPreguntas();actualizarBarra();const main=document.getElementById('mainContent');main.innerHTML='';const letras=['A','B','C','D'];preguntas.forEach((q,i)=>{const card=document.createElement('div');card.className='card';card.innerHTML='<div class="card-num">Pregunta '+(i+1)+' de '+preguntas.length+'</div><div class="card-pregunta">'+q.p+'</div><div class="opciones">'+q.ops.map((op,j)=>'<button class="opcion" data-qi="'+i+'" onclick="responder('+i+','+j+')"><span class="letra">'+letras[j]+')</span><span>'+op+'</span></button>').join('')+'</div><div class="explicacion" id="exp-'+i+'">'+q.exp+'</div>';main.appendChild(card);});const sep=document.createElement('div');sep.className='divider';sep.textContent='Fin del test';main.appendChild(sep);const res=document.createElement('div');res.className='resultado';res.id='resultado';res.innerHTML='<div class="resultado-eyebrow">Resultado final</div><h2>Test completado</h2><div class="resultado-nota" id="resPunt">0 <span>/ 50</span></div><div id="resCalif"></div><div class="stats"><div class="stat"><div class="stat-num" id="resCorr" style="color:#166534">0</div><div class="stat-lab">Correctas</div></div><div class="stat"><div class="stat-num" id="resIncorr" style="color:#991b1b">0</div><div class="stat-lab">Incorrectas</div></div><div class="stat"><div class="stat-num" id="resPct">0%</div><div class="stat-lab">% aciertos</div></div></div><p class="resultado-hint">Desplázate hacia arriba para revisar las explicaciones de cada pregunta.</p><button class="btn btn-naranja" onclick="render();window.scrollTo({top:0,behavior:\'smooth\'})">↺ Repetir con nuevo orden</button>';main.appendChild(res);}
render();
</script>
